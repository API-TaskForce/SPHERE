saasName: sphere
syntaxVersion: "3.0"
version: "2.0"
createdAt: "2026-04-02"
currency: EUR

features:

  # ── DOMAIN ────────────────────────────────────────────────────────────────

  pricingManagement:
    description: >
      Upload, view, edit and delete pricing YAML files within your organization.
    valueType: BOOLEAN
    defaultValue: true
    expression: pricingContext['features']['pricingManagement']
    type: DOMAIN

  pricings:
    description: >
      Number of individual pricing models the organization can store.
      Gated by the maxPricings usage limit.
    valueType: BOOLEAN
    defaultValue: true
    expression: subscriptionContext['pricings'] < pricingContext['usageLimits']['maxPricings']
    serverExpression: subscriptionContext['pricings'] <= pricingContext['usageLimits']['maxPricings']
    type: DOMAIN

  pricingVersioning:
    description: >
      Maintain multiple versions of a pricing model and navigate its full
      version history.
    valueType: BOOLEAN
    defaultValue: true
    expression: pricingContext['features']['pricingVersioning']
    type: DOMAIN

  pricingEditor:
    description: >
      Edit pricing YAML files directly in the browser using the built-in
      Monaco-based editor.
    valueType: BOOLEAN
    defaultValue: true
    expression: pricingContext['features']['pricingEditor']
    type: DOMAIN

  configurationSpaceAnalysis:
    description: >
      Compute and explore the full configuration space of a pricing model
      via constraint solving (MiniZinc).
    valueType: BOOLEAN
    defaultValue: true
    expression: pricingContext['features']['configurationSpaceAnalysis']
    type: DOMAIN

  collectionManagement:
    description: >
      Create, organize and manage collections of pricing models within
      your organization.
    valueType: BOOLEAN
    defaultValue: true
    expression: pricingContext['features']['collectionManagement']
    type: DOMAIN

  collections:
    description: >
      Number of pricing collections the organization can store.
      Gated by the maxCollections usage limit.
    valueType: BOOLEAN
    defaultValue: true
    expression: subscriptionContext['collections'] < pricingContext['usageLimits']['maxCollections']
    serverExpression: subscriptionContext['collections'] <= pricingContext['usageLimits']['maxCollections']
    type: DOMAIN

  bulkImport:
    description: >
      Import multiple pricing YAML files at once by uploading a ZIP archive
      to create a collection in a single operation.
    valueType: BOOLEAN
    defaultValue: false
    expression: pricingContext['features']['bulkImport']
    type: DOMAIN

  collectionExport:
    description: >
      Download a pricing collection as a ZIP archive containing all its
      YAML files.
    valueType: BOOLEAN
    defaultValue: false
    expression: pricingContext['features']['collectionExport']
    type: DOMAIN

  # ── INFORMATION ───────────────────────────────────────────────────────────

  pricingAnalytics:
    description: >
      View analytical metrics for individual pricing models, including
      feature counts, plan distribution, add-on breakdown and price ranges.
    valueType: BOOLEAN
    defaultValue: true
    expression: pricingContext['features']['pricingAnalytics']
    type: INFORMATION

  collectionAnalytics:
    description: >
      Access evolution analytics for pricing collections, tracking changes
      in plans, features, add-ons and configuration space size over time.
    valueType: BOOLEAN
    defaultValue: false
    expression: pricingContext['features']['collectionAnalytics']
    type: INFORMATION

  # ── AUTOMATION ────────────────────────────────────────────────────────────

  harveyAssistant:
    description: >
      Access Harvey, the AI-powered pricing assistant, to analyze, compare
      and query pricing models using natural language.
    valueType: BOOLEAN
    defaultValue: true
    expression: pricingContext['features']['harveyAssistant']
    type: AUTOMATION
    automationType: BOT

  # ── MANAGEMENT ────────────────────────────────────────────────────────────

  organizationManagement:
    description: >
      Create and manage organizations, invite members and assign roles
      (owner, admin, member).
    valueType: BOOLEAN
    defaultValue: true
    expression: pricingContext['features']['organizationManagement']
    type: MANAGEMENT

  orgMembers:
    description: >
      Number of members the organization can have.
      Gated by the maxOrgMembers usage limit.
    valueType: BOOLEAN
    defaultValue: true
    expression: subscriptionContext['orgMembers'] < pricingContext['usageLimits']['maxOrgMembers']
    serverExpression: subscriptionContext['orgMembers'] <= pricingContext['usageLimits']['maxOrgMembers']
    type: MANAGEMENT

  groupManagement:
    description: >
      Create and manage groups within an organization, assign members with
      granular roles (admin, editor, viewer) and control collection access
      per group.
    valueType: BOOLEAN
    defaultValue: false
    expression: pricingContext['features']['groupManagement']
    type: MANAGEMENT

  groups:
    description: >
      Number of groups the organization can create.
      Gated by the maxGroups usage limit.
    valueType: BOOLEAN
    defaultValue: false
    expression: subscriptionContext['groups'] < pricingContext['usageLimits']['maxGroups']
    serverExpression: subscriptionContext['groups'] <= pricingContext['usageLimits']['maxGroups']
    type: MANAGEMENT

  groupMembers:
    description: >
      Number of members that can be added to each group.
      Gated by the maxGroupMembers usage limit.
    valueType: BOOLEAN
    defaultValue: false
    expression: subscriptionContext['groupMembers'] < pricingContext['usageLimits']['maxGroupMembers']
    serverExpression: subscriptionContext['groupMembers'] <= pricingContext['usageLimits']['maxGroupMembers']
    type: MANAGEMENT

  sharedCollections:
    description: >
      Assign a single collection to multiple groups within an organization,
      enabling cross-team access to the same pricing resources.
    valueType: BOOLEAN
    defaultValue: false
    expression: pricingContext['features']['sharedCollections']
    type: MANAGEMENT

  orgWideCollections:
    description: >
      Make collections accessible to all organization members without
      requiring group assignment.
    valueType: BOOLEAN
    defaultValue: true
    expression: pricingContext['features']['orgWideCollections']
    type: MANAGEMENT

  # ── SUPPORT ───────────────────────────────────────────────────────────────

  communitySupport:
    description: >
      Access community forums and public documentation for help and guidance.
    valueType: BOOLEAN
    defaultValue: true
    expression: pricingContext['features']['communitySupport']
    type: SUPPORT

  standardSupport:
    description: >
      Access official support channels via email with guaranteed response
      times.
    valueType: BOOLEAN
    defaultValue: false
    expression: pricingContext['features']['standardSupport']
    type: SUPPORT

  prioritySupport:
    description: >
      Access dedicated priority support with accelerated response times and
      direct escalation path.
    valueType: BOOLEAN
    defaultValue: false
    expression: pricingContext['features']['prioritySupport']
    type: SUPPORT

usageLimits:

  maxGroups:
    description: Maximum number of groups allowed within the organization.
    valueType: NUMERIC
    defaultValue: 0
    unit: group
    type: NON_RENEWABLE
    trackable: true
    linkedFeatures:
      - groups

  maxOrgMembers:
    description: Maximum number of members allowed in the organization.
    valueType: NUMERIC
    defaultValue: 1
    unit: member
    type: NON_RENEWABLE
    trackable: true
    linkedFeatures:
      - orgMembers

  maxGroupMembers:
    description: Maximum number of members allowed in each group within the organization.
    valueType: NUMERIC
    defaultValue: 0
    unit: member
    type: NON_RENEWABLE
    trackable: true
    linkedFeatures:
      - groupMembers

  maxCollections:
    description: Maximum number of pricing collections allowed within the organization.
    valueType: NUMERIC
    defaultValue: 5
    unit: collection
    type: NON_RENEWABLE
    trackable: true
    linkedFeatures:
      - collections

  maxPricings:
    description: Maximum number of individual pricing models allowed within the organization.
    valueType: NUMERIC
    defaultValue: 15
    unit: pricing
    type: NON_RENEWABLE
    trackable: true
    linkedFeatures:
      - pricings

plans:

  FREE:
    description: >
      For individual researchers and personal use. Includes core pricing
      analysis tools with no collaboration features.
    price: 0
    unit: org/month
    features: null
    usageLimits: null

  PRO:
    description: >
      For teams and collaborative organizations. Unlocks group management,
      collection sharing, evolution analytics and bulk operations.
    price: 9
    unit: org/month
    features:
      collectionAnalytics:
        value: true
      bulkImport:
        value: true
      collectionExport:
        value: true
      groupManagement:
        value: true
      sharedCollections:
        value: true
      standardSupport:
        value: true
    usageLimits:
      maxGroups:
        value: 5
      maxOrgMembers:
        value: 15
      maxGroupMembers:
        value: 10
      maxCollections:
        value: 30
      maxPricings:
        value: 200

  ENTERPRISE:
    description: >
      For large organizations with no resource restrictions. Includes
      priority support and unlimited usage across all limits.
    price: 29
    unit: org/month
    features:
      collectionAnalytics:
        value: true
      bulkImport:
        value: true
      collectionExport:
        value: true
      groupManagement:
        value: true
      sharedCollections:
        value: true
      standardSupport:
        value: true
      prioritySupport:
        value: true
    usageLimits:
      maxGroups:
        value: 9999
      maxOrgMembers:
        value: 9999
      maxGroupMembers:
        value: 9999
      maxCollections:
        value: 9999
      maxPricings:
        value: 9999

addOns:

  extraPricings:
    description: >
      Increase the pricing model limit by 50 for the current organization.
      Can be stacked up to 10 times.
    availableFor:
      - PRO
      - ENTERPRISE
    price: 2
    unit: org/month
    subscriptionConstraints:
      min: 1
      max: 10
      step: 1
    features: null
    usageLimits: null
    usageLimitsExtensions:
      maxPricings:
        value: 50

  extraCollections:
    description: >
      Increase the collection limit by 10 for the current organization.
      Can be stacked up to 10 times.
    availableFor:
      - PRO
      - ENTERPRISE
    price: 2
    unit: org/month
    subscriptionConstraints:
      min: 1
      max: 10
      step: 1
    features: null
    usageLimits: null
    usageLimitsExtensions:
      maxCollections:
        value: 10
